<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Guía AR — Terminal de Tucumán</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #000;
      touch-action: none;
    }

    /* ── Lower Third (subtítulos) ── */
    #lower-third {
      position: fixed;
      bottom: 80px;
      left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.82));
      padding: 18px 20px 12px;
      color: #fff;
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
      transition: opacity 0.4s;
      pointer-events: none;
      z-index: 10;
    }
    #lower-third.hidden { opacity: 0; }

    /* ── Info Overlay ── */
    #info-overlay {
      position: fixed;
      bottom: 130px;
      left: 50%; transform: translateX(-50%);
      width: 280px;
      background: rgba(15,15,20,0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 18px 20px;
      color: #fff;
      z-index: 20;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      animation: overlayIn 0.25s ease;
    }
    #info-overlay .overlay-title {
      font-size: 14px; font-weight: 700; color: #4da6ff;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    #info-overlay .overlay-body { font-size: 14px; line-height: 1.6; white-space: pre-line; }
    #info-overlay .overlay-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: #aaa;
      font-size: 18px; cursor: pointer; line-height: 1;
    }

    /* ── Waiting hint ── */
    #waiting-msg {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.62);
      color: rgba(255, 255, 255, 0.92);
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 13.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
      z-index: 200;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      white-space: nowrap;
      animation: pulse 2.4s ease-in-out infinite;
    }

    /* ── UI Buttons ── */
    #ui-buttons {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 200;
    }

    .ar-btn {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 12px 15px;
      border-radius: 26px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }

    .ar-btn:active,
    .ar-btn.active {
      transform: scale(0.94);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      background: linear-gradient(135deg, #0059b3 0%, #003d7a 100%);
    }

    /* ── Loading overlay ── */
    #loader {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
      color: white;
      font-size: 15px;
      font-weight: 500;
    }

    #loader .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #loader p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 4px; }

    /* ── Animations ── */
    @keyframes overlayIn {
      from { opacity: 0; transform: translateX(-50%) scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.65; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loader">
    <div class="spinner"></div>
    <span>Terminal de Tucumán</span>
    <p>Cargando experiencia AR…</p>
  </div>

  <!-- Lower Third (subtítulos) -->
  <div id="lower-third" class="hidden">
    <span id="subtitle-text"></span>
  </div>

  <!-- Info Overlay -->
  <div id="info-overlay">
    <button class="overlay-close" onclick="closeOverlay()">✕</button>
    <div class="overlay-title" id="overlay-title"></div>
    <div class="overlay-body" id="overlay-body"></div>
  </div>

  <!-- Mensaje de espera -->
  <div id="waiting-msg">📷 Apuntá la cámara al marcador Hiro</div>

  <!-- Botón Activar Sonido — requerido por iOS/Android -->
  <div id="sound-bar" style="position:fixed;top:0;left:0;width:100%;z-index:300;display:flex;justify-content:center;padding:10px;">
    <button id="btn-sound" class="ar-btn" onclick="activarSonido()" aria-label="Activar sonido del video" style="background:linear-gradient(135deg,#e67e22,#d35400);font-size:14px;">
      🔊 Activar Sonido
    </button>
  </div>

  <!-- Botones táctiles -->
  <div id="ui-buttons" role="navigation" aria-label="Opciones del guía">
    <button id="btn-comer"     class="ar-btn" onclick="handleBtn(this,'comer')"     aria-label="Dónde comer">🍽️ Dónde comer</button>
    <button id="btn-hospedaje" class="ar-btn" onclick="handleBtn(this,'hospedaje')" aria-label="Hospedaje">🏨 Hospedaje</button>
    <button id="btn-idioma"    class="ar-btn" onclick="switchLang()"                aria-label="Idioma">🌐 Idioma</button>
  </div>

  <!-- Escena AR -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true; colorManagement: true;"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false"
  >
    <a-assets timeout="15000">
      <video id="guia-video" src="guia.mp4" playsinline webkit-playsinline loop muted preload="auto" crossorigin="anonymous"></video>
    </a-assets>

    <a-marker preset="hiro" id="hiro-marker" smooth="true" smoothCount="5" smoothTolerance="0.01">
      <a-video
        id="guide-video"
        src="#guia-video"
        width="2"
        height="3.5"
        position="0 1.75 0"
        look-at="[camera]"
      ></a-video>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const messages = {
      es: {
        default:   '¡Hola! Bienvenido a la Terminal de Tucumán. ¿En qué te puedo ayudar?',
        comer:     '¿Tenés hambre? En el primer piso hay un patio de comidas, local 3 Don Panchos con un 15% de descuento en efectivo.',
        hospedaje: 'Si necesitás descansar, hay hoteles a dos cuadras por la calle, como el Sheraton Tucumán.',
      },
      en: {
        default:   'Hello! Welcome to Tucumán Terminal. How can I help you?',
        comer:     'Are you hungry? On the first floor there is a food court, stall 3 Don Panchos with a 15% cash discount.',
        hospedaje: 'If you need to rest, there are hotels two blocks away on the street, like the Sheraton Tucumán.',
      }
    };

    const overlayData = {
      es: {
        comer:     { title: 'Dónde Comer', body: '🍽️ Don Panchos — 1er piso\n15% de descuento mostrando este QR.' },
        hospedaje: { title: 'Hospedaje',   body: '🏨 Sheraton Tucumán\nConvenio especial para pasajeros de la Terminal.' }
      },
      en: {
        comer:     { title: 'Where to Eat',  body: '🍽️ Don Panchos — 1st floor\n15% discount showing this QR.' },
        hospedaje: { title: 'Accommodation', body: '🏨 Sheraton Tucumán\nSpecial deal for Terminal passengers.' }
      }
    };

    let currentLang   = 'es';
    let markerVisible = false;
    let activeBtn     = null;

    const waitingMsg = document.getElementById('waiting-msg');
    const loader     = document.getElementById('loader');
    const marker     = document.getElementById('hiro-marker');

    document.querySelector('a-scene').addEventListener('loaded', () => {
      loader.style.transition = 'opacity 0.5s ease';
      loader.style.opacity = '0';
      setTimeout(() => { loader.style.display = 'none'; }, 500);
    });

    marker.addEventListener('markerFound', () => {
      markerVisible = true;
      waitingMsg.style.display = 'none';
      showSubtitle(messages[currentLang].default);
      document.getElementById('guia-video').play();
    });

    marker.addEventListener('markerLost', () => {
      markerVisible = false;
      hideSubtitle();
      closeOverlay();
      waitingMsg.style.display = 'block';
      document.getElementById('guia-video').pause();
    });

    function showSubtitle(text) {
      document.getElementById('subtitle-text').textContent = text;
      document.getElementById('lower-third').classList.remove('hidden');
    }

    function hideSubtitle() {
      document.getElementById('lower-third').classList.add('hidden');
    }

    function handleBtn(btn, type) {
      if (activeBtn) activeBtn.classList.remove('active');
      activeBtn = btn;
      btn.classList.add('active');
      const data = overlayData[currentLang][type];
      document.getElementById('overlay-title').textContent = data.title;
      document.getElementById('overlay-body').textContent  = data.body;
      document.getElementById('info-overlay').style.display = 'block';
      showSubtitle(messages[currentLang][type]);
    }

    function closeOverlay() {
      document.getElementById('info-overlay').style.display = 'none';
      if (activeBtn) { activeBtn.classList.remove('active'); activeBtn = null; }
    }

    function switchLang() {
      currentLang = currentLang === 'es' ? 'en' : 'es';
      const isEN = currentLang === 'en';
      document.getElementById('btn-comer').textContent     = isEN ? '🍽️ Food'    : '🍽️ Dónde comer';
      document.getElementById('btn-hospedaje').textContent = isEN ? '🏨 Hotels'  : '🏨 Hospedaje';
      document.getElementById('btn-idioma').textContent    = isEN ? '🌐 Español' : '🌐 Idioma';
      const msg = isEN
        ? 'Language switched to English. How can I help you?'
        : '¡Idioma cambiado a español! ¿En qué te puedo ayudar?';
      showSubtitle(msg);
      closeOverlay();
    }

    function activarSonido() {
      const vid = document.getElementById('guia-video');
      vid.muted  = false;
      vid.volume = 1.0;
      document.getElementById('sound-bar').style.display = 'none';
    }
  </script>
</body>
</html>
